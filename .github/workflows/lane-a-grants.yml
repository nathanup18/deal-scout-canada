name: lane-a-grants
on:
  workflow_dispatch:   # triggered by the daily Claude scheduled task, not GitHub's own cron

concurrency: grants-state

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Federal G&C disclosures
        run: PYTHONPATH=src python -m dealscout.run grants
      - name: ERA + CICE project pages
        if: always()
        run: PYTHONPATH=src python -m dealscout.run grant-pages
      - name: NSERC Alliance (experimental)
        if: always()
        continue-on-error: true
        run: PYTHONPATH=src python -m dealscout.run nserc
      - name: Commit raw output + state
        if: always()
        run: |
          git config user.name "deal-scout-bot"
          git config user.email "bot@users.noreply.github.com"
          git pull --rebase --autostash
          git add raw/ state/
          git diff --cached --quiet || git commit -m "grants: $(date -u +%F)"
          git push
