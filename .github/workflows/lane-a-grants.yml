name: lane-a-grants
on:
  schedule:
    - cron: "0 14 * * 2"   # weekly, Tuesday 14:00 UTC
  workflow_dispatch:

concurrency: state-writes

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Federal G&C disclosures
        run: PYTHONPATH=src python -m dealscout.run grants
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: ERA + CICE project pages
        if: always()
        run: PYTHONPATH=src python -m dealscout.run grant-pages
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: NSERC Alliance (experimental)
        if: always()
        continue-on-error: true
        run: PYTHONPATH=src python -m dealscout.run nserc
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Commit state
        if: always()
        run: |
          git config user.name "deal-scout-bot"
          git config user.email "bot@users.noreply.github.com"
          git pull --rebase
          git add state/
          git diff --cached --quiet || git commit -m "state: grants $(date -u +%F)"
          git push
