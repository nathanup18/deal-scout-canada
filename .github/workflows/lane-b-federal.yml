name: lane-b-federal
on:
  workflow_dispatch:   # triggered by the daily Claude scheduled task, not GitHub's own cron
    inputs:
      skip_directors:
        description: "Keyword track only (skip the ~2h director API sweep)"
        type: boolean
        default: false

concurrency: federal-state

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: PYTHONPATH=src python -m dealscout.run corpcan ${{ inputs.skip_directors && '--skip-directors' || '' }}
        env:
          CORPCAN_API_KEY: ${{ secrets.CORPCAN_API_KEY }}
      - name: Commit raw output + state
        if: always()
        run: |
          git config user.name "deal-scout-bot"
          git config user.email "bot@users.noreply.github.com"
          git pull --rebase --autostash
          git add raw/ state/
          git diff --cached --quiet || git commit -m "corpcan: $(date -u +%F)"
          git push
