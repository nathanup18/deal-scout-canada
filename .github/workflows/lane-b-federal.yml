name: lane-b-federal
on:
  schedule:
    - cron: "0 12 3 * *"   # monthly, day 3 (publication lands early in the month)
  workflow_dispatch:
    inputs:
      skip_directors:
        description: "Keyword track only (skip the ~2h director API sweep)"
        type: boolean
        default: false

concurrency: state-writes

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: PYTHONPATH=src python -m dealscout.run corpcan ${{ inputs.skip_directors && '--skip-directors' || '' }}
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CORPCAN_API_KEY: ${{ secrets.CORPCAN_API_KEY }}
      - name: Commit state
        if: always()
        run: |
          git config user.name "deal-scout-bot"
          git config user.email "bot@users.noreply.github.com"
          git pull --rebase
          git add state/
          git diff --cached --quiet || git commit -m "state: corpcan $(date -u +%F)"
          git push
