name: lane-b-orgbook
on:
  workflow_dispatch:   # triggered by the daily Claude scheduled task, not GitHub's own cron

concurrency: orgbook-state

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: PYTHONPATH=src python -m dealscout.run orgbook
      - name: Commit raw output + state
        run: |
          git config user.name "deal-scout-bot"
          git config user.email "bot@users.noreply.github.com"
          git pull --rebase
          git add raw/ state/
          git diff --cached --quiet || git commit -m "orgbook: $(date -u +%F)"
          git push
